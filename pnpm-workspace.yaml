packages:
  - apps/*
  - packages/*
  - tools/*

catalogMode: prefer

catalog:
  "@types/node": ^24
  typescript: ^5
  vite: npm:@voidzero-dev/vite-plus-core@latest
  vitest: npm:@voidzero-dev/vite-plus-test@latest
  vite-plus: latest
  effect: 4.0.0-beta.75
  react: ^19.2.6
  react-dom: ^19.2.6
  "@effect/atom-react": 4.0.0-beta.75
  tailwindcss: ^4.3.0
  "@tailwindcss/vite": ^4.3.0
  class-variance-authority: ^0.7.1
  clsx: ^2.1.1
  tailwind-merge: ^3.6.0
  lucide-react: ^1.17.0
  tw-animate-css: ^1.4.0
  "@types/react": ^19.2.15
  "@types/react-dom": ^19.2.3
  "@vitejs/plugin-react": ^6.0.2
  swagger2openapi: ^7.0.8
  openapi-merge: ^1.3.3
  "@effect/platform-node": 4.0.0-beta.75
  "@tim-smart/openapi-gen": ^1.0.4
  "@typescript/native-preview": 7.0.0-dev.20260527.2
  "@effect/language-service": ^0.86.2
overrides:
  vite: "catalog:"
  vitest: "catalog:"
peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: "*"
    vitest: "*"
allowBuilds:
  msgpackr-extract: true
patchedDependencies:
  openapi-merge: patches/openapi-merge.patch
minimumReleaseAgeExclude:
  - "@tim-smart/openapi-gen@1.0.4"
  - "@effect/atom-react@4.0.0-beta.75"
  - "@effect/openapi-generator@4.0.0-beta.75"
  - "@effect/platform-node-shared@4.0.0-beta.75"
  - "@effect/platform-node@4.0.0-beta.75"
  - effect@4.0.0-beta.75
